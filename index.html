    <div style="display:flex;flex-direction:column;gap:10px;margin-top:16px">
      <button class="btn btn-primary btn-full" onclick="shareText()">
        📤 Share as Text
      </button>
      <button class="btn btn-ghost btn-full" onclick="exportTrip('${trip.id}')">
        💾 Export as JSON File
      </button>
    </div>
    <div style="margin-top:24px;padding:16px;background:var(--bg-subtle);border-radius:var(--radius-sm)">
      <div style="font-weight:600;font-size:14px;margin-bottom:6px">📲 Import on another device</div>
      <ol style="font-size:13px;color:var(--text-3);line-height:1.8;padding-left:16px;list-style:decimal">
        <li>Export this trip as a JSON file</li>
        <li>Save to Google Drive, iCloud, or share directly</li>
        <li>Open Wayfarer on the other device</li>
        <li>Go to Settings → Import Trip</li>
        <li>Select the JSON file</li>
      </ol>
    </div>
  </div>`;

  // Store text for share button
  window._shareText = text;
}

function buildShareText(trip, items) {
  const lines = [];
  lines.push(`✈️ ${trip.name}`);
  lines.push(`📅 ${fmtDate(trip.startDate)} – ${fmtDate(trip.endDate)}`);
  if (trip.cities && trip.cities.length) lines.push(`📍 ${trip.cities.join(' → ')}`);
  lines.push('');

  // Group by date
  const byDate = {};
  items.forEach(i => {
    if (!byDate[i.date]) byDate[i.date] = [];
    byDate[i.date].push(i);
  });

  Object.keys(byDate).sort().forEach(d => {
    lines.push(`── ${fmtDate(d)} ──`);
    byDate[d].sort((a,b) => (a.time||'').localeCompare(b.time||'')).forEach(item => {
      const t   = item.time ? fmtTime(item.time) + ' ' : '';
      const loc = item.location ? ` @ ${item.location}` : '';
      const ref = item.bookingRef ? ` [${item.bookingRef}]` : '';
      lines.push(`${typeIcon(item.type)} ${t}${item.title}${loc}${ref}`);
      if (item.description) lines.push(`   ${item.description}`);
    });
    lines.push('');
  });

  lines.push('— Shared via Wayfarer —');
  return lines.join('\n');
}

async function shareText() {
  const text = window._shareText || '';
  if (navigator.share) {
    try {
      await navigator.share({ title: 'My Itinerary', text });
      return;
    } catch(e) {}
  }
  await navigator.clipboard.writeText(text).catch(() => {});
  showToast('📋 Itinerary copied to clipboard');
}

/* ══════════════════════════════════════════════════════
   EXPORT / IMPORT
══════════════════════════════════════════════════════ */
async function exportTrip(tripId) {
  const trip      = await Trips.get(tripId);
  const items     = await Items.forTrip(tripId);
  const checklist = await Checklist.forTrip(tripId);
  if (!trip) { showToast('Trip not found'); return; }

  const payload = JSON.stringify({ version: 1, trip, items, checklist }, null, 2);
  const blob    = new Blob([payload], { type: 'application/json' });
  const url     = URL.createObjectURL(blob);
  const a       = document.createElement('a');
  a.href        = url;
  a.download    = `wayfarer-${trip.name.replace(/\s+/g,'-').toLowerCase()}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
  showToast('💾 Trip exported!');
}

async function handleImportFile(input) {
  const file = input.files[0];
  if (!file) return;
  const text = await file.text();
  await importTripJSON(text);
  input.value = '';
}

function handleImportDrop(e) {
  e.preventDefault();
  document.getElementById('import-zone').classList.remove('drag-over');
  const file = e.dataTransfer?.files?.[0];
  if (!file) return;
  const r = new FileReader();
  r.onload = async ev => { await importTripJSON(ev.target.result); };
  r.readAsText(file);
}

async function importTripJSON(text) {
  let data;
  try { data = JSON.parse(text); } catch(e) {
    showToast('❌ Invalid JSON file'); return;
  }
  if (!data.trip || !data.items) {
    showToast('❌ Not a valid Wayfarer file'); return;
  }

  // Remap IDs to avoid conflicts
  const idMap  = {};
  const newTripId = uid();
  idMap[data.trip.id] = newTripId;
  const newTrip = { ...data.trip, id: newTripId, createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() };
  await Trips.put(newTrip);

  for (const item of data.items) {
    const newId = uid();
    idMap[item.id] = newId;
    await Items.put({ ...item, id: newId, tripId: newTripId, updatedAt: new Date().toISOString() });
  }

  for (const cl of (data.checklist || [])) {
    await Checklist.put({ ...cl, id: uid(), tripId: newTripId, createdAt: new Date().toISOString() });
  }

  showToast(`✅ "${data.trip.name}" imported!`);
  navigate('trip', { tripId: newTripId });
}

══════════════════════════════════════════════════════ */
function confirmDelete(kind, id, name) {
  const modal = document.getElementById('delete-modal');
  document.getElementById('delete-modal-title').textContent = `Delete "${name}"?`;
  document.getElementById('delete-modal-body').textContent =
    kind === 'trip'
      ? 'This will delete the trip and all its items. Cannot be undone.'
      : 'This will permanently delete this item.';
  modal.classList.add('show');

  document.getElementById('delete-modal-confirm').onclick = async () => {
    modal.classList.remove('show');
    if (kind === 'trip') {
      const items = await Items.forTrip(id);
      for (const i of items) await Items.delete(i.id);
      const cl    = await Checklist.forTrip(id);
      for (const c of cl) await Checklist.delete(c.id);
      await Trips.delete(id);
      showToast('🗑️ Trip deleted');
      navigate('trips');
    } else {
      const item = await Items.get(id);
      const tid  = item?.tripId;
      await Items.delete(id);
      showToast('🗑️ Item deleted');
      if (tid) navigate('trip', { tripId: tid });
      else goBack();
    }
  };
}

function closeDeleteModal() {
  document.getElementById('delete-modal').classList.remove('show');
}

/* ══════════════════════════════════════════════════════
   NOTIFICATIONS
══════════════════════════════════════════════════════ */
async function scheduleNotifications() {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;

  const notifRec = await Settings.get('notifications').catch(() => null);
  if (!notifRec || !notifRec.value) return;

  const items = await Items.getAll();
  const t     = today();
  const now   = Date.now();

  items.filter(i => i.date === t && i.time).forEach(item => {
    const [h, m] = item.time.split(':').map(Number);
    const itemMs = new Date(`${t}T${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:00`).getTime();
    const fireAt = itemMs - 30 * 60 * 1000;
    const delay  = fireAt - now;
    if (delay > 0) {
      setTimeout(() => {
        new Notification(`Wayfarer — ${typeIcon(item.type)} ${item.title}`, {
          body: `In 30 minutes · ${item.location || fmtTime(item.time)}`,
          icon: 'manifest-icon-192.png',
          tag:  item.id,
        });
      }, delay);
    }
  });
}

function registerSW() {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js', { updateViaCache: 'none' })
      .then(() => console.log('SW registered'))
      .catch(e => console.warn('SW error:', e));
  }
}

══════════════════════════════════════════════════════ */
async function seedDemoData() {
  const trips = await Trips.getAll();
  if (trips.length > 0) return;

  const tid = uid();
  const startDate = new Date();
  startDate.setDate(startDate.getDate() - 1);
  const endDate = new Date();
  endDate.setDate(endDate.getDate() + 5);
  const sd = startDate.toISOString().slice(0,10);
  const ed = endDate.toISOString().slice(0,10);
  const td = today();

  await Trips.put({
    id: tid, name: 'Malaysia — KL & Redang',
    country: 'Malaysia', cities: ['Kuala Lumpur', 'Pulau Redang'],
    startDate: sd, endDate: ed, color: 'grad-ocean',
    createdAt: new Date().toISOString(), updatedAt: new Date().toISOString()
  });

  const nextH = String(new Date().getHours() + 1).padStart(2,'0');

  const demoItems = [
    { type:'flight', title:'SQ475 Singapore → KL', date: sd, time:'09:00',
      location:'Changi Airport T3', bookingRef:'SQ475AB', description:'Check in 2h before departure.' },
    { type:'hotel', title:'The Westin KL', date: sd, time:'14:00',
      location:'199 Jalan Bukit Bintang, KL', bookingRef:'WK-10029', contactInfo:'+60 3-2731 8333' },
    { type:'activity', title:'Petronas Twin Towers Visit', date: td, time: nextH + ':00',
      location:'KLCC', description:'Skybridge tickets pre-booked.' },
    { type:'meal', title:'Dinner at Jalan Alor', date: td, time:'19:30',
      location:'Jalan Alor, Bukit Bintang', description:'Famous hawker street food.' },
  ];

  for (const d of demoItems) {
    await Items.put({
      id: uid(), tripId: tid, ...d,
      lat: null, lng: null, contactInfo: d.contactInfo||'', urls: [], attachments: [],
      isFavourite: false, createdAt: new Date().toISOString(), updatedAt: new Date().toISOString()
    });
  }

  await Checklist.put({ id: uid(), tripId: tid, text: 'Print boarding pass',   done: true,  createdAt: new Date().toISOString() });
  await Checklist.put({ id: uid(), tripId: tid, text: 'Pack sunscreen & snorkel gear', done: false, createdAt: new Date().toISOString() });
  await Checklist.put({ id: uid(), tripId: tid, text: 'Exchange to MYR',        done: false, createdAt: new Date().toISOString() });
  await Checklist.put({ id: uid(), tripId: tid, text: 'Download offline maps',  done: false, createdAt: new Date().toISOString() });
}

const AI_INTERESTS = ['🍽️ Food','🏛️ Culture','🌿 Nature','🛍️ Shopping',

const AI_DAYS      = [1, 2, 3, 5, 7, 10, 14];

  'Researching your destination ✈️',

  'Planning your perfect days 🗓️',
  'Adding hidden gems 💎',
  'Almost there... 🎒',
];

const aiState = {
  destination: '',
  days:        5,
  startDate:   today(),
  style:       'Balanced 🎯',
  interests:   ['🍽️ Food','🏛️ Culture'],
  specialNeeds: [],
  specialText:  '',
  result:      null,
  loading:     false,
};

async function renderAiPlanner() {
  const body = document.getElementById('ai-planner-body');
  const apiKey = await getApiKey();

  if (!apiKey) {
    renderApiKeySetup(body);
    return;
  }

  if (aiState.loading) {
    renderAiLoading(body);
    return;
  }

  if (aiState.result) {
    renderAiResult(body, aiState.result);
    return;
  }

  renderAiForm(body);
}

function renderAiLoading(body) {
  let msgIdx = 0;
  body.innerHTML = `
  <div class="ai-loading">
    <div class="ai-spinner"></div>
    <div class="ai-loading-msg" id="ai-loading-msg">${AI_MSGS[0]}</div>
    <div style="font-size:13px;color:var(--text-muted)">This takes about 10–15 seconds</div>
  </div>`;

  const interval = setInterval(() => {
    msgIdx = (msgIdx + 1) % AI_MSGS.length;
    const el = document.getElementById('ai-loading-msg');
    if (el) el.textContent = AI_MSGS[msgIdx];
    else clearInterval(interval);
  }, 3000);
}

function renderAiResult(body, result) {
  // Group items by date
  const byDate = {};
  (result.items || []).forEach(item => {
    if (!byDate[item.date]) byDate[item.date] = [];
    byDate[item.date].push(item);
  });

  const dates = Object.keys(byDate).sort();

  const daysHtml = dates.map((d, idx) => {
    const dt = new Date(d + 'T00:00:00');
    const label = dt.toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'short' });
    const items = byDate[d].sort((a,b) => (a.time||'').localeCompare(b.time||''));
    return `<div class="ai-result-day">
      <div class="ai-result-day-label">Day ${idx+1} · ${label}</div>
      ${items.map(i => `
      <div class="ai-result-item">
        <div class="ai-result-dot" style="background:${typeColor(i.type)}"></div>
        <span>${typeIcon(i.type)} ${escHtml(i.title)}${i.time ? ` <span style="color:var(--text-muted);font-size:12px">${fmtTime(i.time)}</span>` : ''}</span>
      </div>`).join('')}
    </div>`;
  }).join('');

  body.innerHTML = `
  <div style="background:linear-gradient(135deg,#4527A0,#1665C0);
    color:#fff;padding:20px 20px 16px">
    <div style="font-size:12px;opacity:0.75;margin-bottom:4px">AI Generated</div>
    <div style="font-family:'Plus Jakarta Sans',sans-serif;font-size:20px;
      font-weight:700;margin-bottom:2px">${escHtml(result.tripName)}</div>
    <div style="font-size:13px;opacity:0.85">${(result.cities||[]).join(' → ')} · ${dates.length} days</div>
  </div>
  <div style="background:var(--bg-card);border-bottom:1px solid var(--border)">
    ${daysHtml}
  </div>
  <div style="padding:16px;display:flex;flex-direction:column;gap:10px">
    <button class="btn-ai" onclick="saveGeneratedTrip()">
      ✅ Add to TripBinder
    </button>
    <button class="btn btn-ghost btn-full" onclick="aiState.result=null;renderAiPlanner()">
      🔄 Regenerate
    </button>
    <button class="btn btn-ghost btn-full" onclick="aiState.result=null;aiState.destination='';renderAiPlanner()">
      ← Plan a different trip
    </button>
  </div>`;
}

/* ── AI STATE SETTERS ────────────────────────────────── */
function aiSetDays(d) { aiState.days = d; renderAiPlanner(); }
function aiSetStyle(s) { aiState.style = s; renderAiPlanner(); }
function aiToggleInterest(i) {
  if (aiState.interests.includes(i)) aiState.interests = aiState.interests.filter(x => x !== i);
  else aiState.interests.push(i);
  renderAiPlanner();
}
function aiToggleSpecial(n) {
  if (aiState.specialNeeds.includes(n)) aiState.specialNeeds = aiState.specialNeeds.filter(x => x !== n);
  else aiState.specialNeeds.push(n);
  renderAiPlanner();
}

/* ── API KEY ─────────────────────────────────────────── */
async function getApiKey() {
  const rec = await Settings.get('geminiKey').catch(() => null);
  return rec ? rec.value : null;
}

async function saveApiKeyFromInput() {
  const input = document.getElementById('api-key-input');
  const key = input?.value?.trim();
  if (!key || key.length < 20) {
    showToast('Please paste your API key');
    return;
  }
  await Settings.set('geminiKey', key);
  showToast('✅ API key saved!');
  renderAiPlanner();
}

async function clearApiKey() {
  await Settings.set('geminiKey', null);
  renderAiPlanner();
}

/* ── GENERATE ────────────────────────────────────────── */
async function startGenerate() {
  const dest = document.getElementById('ai-dest')?.value?.trim()
             || aiState.destination;
  const start = document.getElementById('ai-start')?.value || aiState.startDate;

  if (!dest) { showToast('Please enter a destination'); return; }

  aiState.destination = dest;
  aiState.startDate   = start;
  aiState.loading     = true;
  aiState.result      = null;

  renderAiLoading(document.getElementById('ai-planner-body'));

  try {
    const result = await callAiApi();
    aiState.result  = result;
    aiState.loading = false;
    renderAiResult(document.getElementById('ai-planner-body'), result);
  } catch(err) {
    aiState.loading = false;
    const body = document.getElementById('ai-planner-body');
    body.innerHTML = `
    <div class="empty-state">
      <div class="empty-icon">😕</div>
      <div class="empty-title">Couldn't generate trip</div>
      <div class="empty-sub">${escHtml(err.message || 'Something went wrong. Check your API key and try again.')}</div>
      <button class="btn btn-primary" onclick="renderAiPlanner()">Try Again</button>
    </div>`;
  }
}

async function callAiApi() {
  const apiKey = await getApiKey();
  if (!apiKey) throw new Error('No API key found');

  const styleMap = {
    'Relaxed 😌': '2–3 activities per day with plenty of rest time',
    'Balanced 🎯': '4–5 activities per day, good mix of sightseeing and downtime',
    'Packed ⚡':   '6–7 activities per day, maximise every hour',
  };

  // Calculate dates
  const dates = [];
  const start = new Date(aiState.startDate + 'T00:00:00');
  for (let i = 0; i < aiState.days; i++) {
    const d = new Date(start);
    d.setDate(d.getDate() + i);
    dates.push(localDateStr(d));
  }

  const prompt = `You are an expert travel planner. Create a detailed day-by-day itinerary.

Trip details:
- Destination: ${aiState.destination}
- Dates: ${dates[0]} to ${dates[dates.length-1]} (${aiState.days} days)
- Travel style: ${styleMap[aiState.style] || aiState.style}
- Interests: ${aiState.interests.map(i => i.replace(/^\S+\s/,'')).join(', ')}

Return ONLY valid JSON, no other text, no markdown code blocks:
{
  "tripName": "descriptive name e.g. Bali Beach & Culture",
  "country": "country name",
  "cities": ["array of cities visited"],
  "items": [
    {
      "type": "flight|hotel|activity|transport|meal|other",
      "title": "specific real place name",
      "date": "YYYY-MM-DD",
      "time": "HH:MM",
      "location": "specific area or address",
      "description": "one short tip (max 10 words)"
    }
  ]
}

Rules:
- Use ONLY these exact dates: ${dates.join(', ')}
- ${aiState.days <= 2 ? 'No hotel needed — this is a day trip, focus on activities, meals and transport' : 'Day 1: include hotel check-in (type hotel, time 14:00 or 15:00)'}
- Each day: include breakfast (08:00-09:00) and dinner (19:00-20:00) at real named restaurants
- Each day: include ${aiState.style.includes('Relaxed') ? '1-2' : aiState.style.includes('Packed') ? '4-5' : '2-3'} activities matching the interests
- Include transport items between distant places
- Use real, well-known, bookable places — no fictional venues
- Spread items evenly across all ${aiState.days} days
${aiState.specialNeeds.length || aiState.specialText.trim() ? `- IMPORTANT special requirements (must be strictly followed throughout the entire trip):
${aiState.specialNeeds.map(n => `  * ${n.replace(/^\S+\s/,'')}`).join('\n')}
${aiState.specialText.trim() ? `  * ${aiState.specialText.trim()}` : ''}` : ''}`;

  const response = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`,
    {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text: prompt }] }],
        generationConfig: {
          temperature: 0.7,
          maxOutputTokens: 8192,
          thinkingConfig: { thinkingBudget: 0 },
        },
      }),
    }
  );

  if (!response.ok) {
    const err = await response.json().catch(() => ({}));
    if (response.status === 400) throw new Error('Invalid API key. Double-check and try again.');
    if (response.status === 429) throw new Error('Rate limit hit. Wait a moment and try again.');
    throw new Error(err.error?.message || `API error ${response.status}`);
  }

  const data = await response.json();
  const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';

  // DEBUG — show raw response so we can diagnose
  console.log('Gemini raw response:', text);

  // Robust JSON extraction — strip thinking blocks, markdown fences, then find the object
  let clean = text;
  clean = clean.replace(/<thinking>[\s\S]*?<\/thinking>/gi, '');
  clean = clean.replace(/```json\s*/gi, '').replace(/```\s*/g, '');
  const jsonMatch = clean.match(/\{[\s\S]*\}/);
  if (!jsonMatch) {
    // Show first 300 chars of raw response to help diagnose
    throw new Error(`Unexpected response: ${text.slice(0,300)}`);
  }
  clean = jsonMatch[0];

  let parsed;
  try { parsed = JSON.parse(clean); }
  catch(e) { throw new Error(`JSON parse failed: ${e.message} — raw: ${clean.slice(0,200)}`); }

  if (!parsed.items || !Array.isArray(parsed.items)) {
    throw new Error('AI returned incomplete data. Please try again.');
  }

  return parsed;
}

/* ── SAVE GENERATED TRIP ─────────────────────────────── */
async function saveGeneratedTrip() {
  const result = aiState.result;
  if (!result) return;

  const dates = [...new Set((result.items||[]).map(i => i.date))].sort();
  const startDate = dates[0] || aiState.startDate;
  const endDate   = dates[dates.length-1] || aiState.startDate;

  const tripId = uid();
  const trip = {
    id: tripId,
    name: result.tripName || aiState.destination,
    country: result.country || '',
    cities: result.cities || [],
    startDate, endDate,
    color: 'grad-ocean',
    createdAt: new Date().toISOString(),
    updatedAt: new Date().toISOString(),
  };
  await Trips.put(trip);

  for (const item of (result.items || [])) {
    await Items.put({
      id: uid(), tripId,
      type:        item.type || 'activity',
      title:       item.title || 'Activity',
      date:        item.date || startDate,
      time:        item.time || '',
      location:    item.location || '',
      lat: null, lng: null,
      bookingRef:  '',
      contactInfo: '',
      description: item.description || '',
      urls: [], attachments: [],
      isFavourite: false,
      createdAt: new Date().toISOString(),
      updatedAt: new Date().toISOString(),
    });
  }

  // Reset AI state
  aiState.result      = null;
  aiState.destination = '';

  showToast('🎉 Trip added to TripBinder!');
  navigate('trip', { tripId, groupTab: 'expenses' });
}


async function init() {
  await openDB();
  await loadTheme();
  await scheduleNotifications();
  registerSW();
  await checkOnboarded();
}

init().catch(console.error);
</script>
