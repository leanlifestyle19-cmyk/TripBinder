<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" id="themeColorMeta" content="#1665C0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Wayfarer">
<meta name="description" content="Your personal offline travel binder">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700&family=Inter:wght@400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<title>Wayfarer</title>
<style>
/* ── RESET ─────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;-webkit-text-size-adjust:100%}
body{height:100%;font-family:'Inter',sans-serif;font-size:15px;line-height:1.5;
  background:var(--bg);color:var(--text);transition:background .25s,color .25s;
  overscroll-behavior:none;-webkit-font-smoothing:antialiased}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font:inherit;color:inherit;border:none;background:none;outline:none}
a{color:inherit;text-decoration:none}
img{max-width:100%;display:block}
ul,ol{list-style:none}
svg{display:block}

/* ── TOKENS ─────────────────────────────────────────── */
:root{
  --bg:#F0F9FF;--bg-card:#FFFFFF;--bg-subtle:#EBF5FF;
  --text:#061826;--text-2:#2D5F7C;--text-3:#5B8FA8;--text-muted:#8BAEC0;
  --border:rgba(22,101,192,0.12);--accent:#1665C0;--teal:#0698A0;
  --flight:#1665C0;--hotel:#0698A0;--activity:#2E7D32;
  --transport:#6A1B9A;--meal:#E65100;--other:#37474F;
  --radius:14px;--radius-sm:8px;--radius-lg:20px;
  --shadow:0 2px 12px rgba(6,24,38,0.08);
  --shadow-lg:0 8px 32px rgba(6,24,38,0.14);
  --nav-h:64px;--header-h:56px;
  --safe-bottom:env(safe-area-inset-bottom,0px);
  font-size:15px;
}
[data-theme="dark"]{
  --bg:#061826;--bg-card:#0D2340;--bg-subtle:#0D2E4E;
  --text:#E1F5FE;--text-2:#90CAE0;--text-3:#5B8FA8;--text-muted:#3D6E8A;
  --border:rgba(77,184,200,0.12);--accent:#4DB8C8;--teal:#4DB8C8;
  --shadow:0 2px 12px rgba(0,0,0,0.3);--shadow-lg:0 8px 32px rgba(0,0,0,0.5);
}

/* ── GRADIENTS ──────────────────────────────────────── */
.grad-ocean{background:linear-gradient(135deg,#1665C0,#0698A0)}
.grad-sunset{background:linear-gradient(135deg,#E65100,#F57F17)}
.grad-forest{background:linear-gradient(135deg,#1B5E20,#00695C)}
.grad-rose{background:linear-gradient(135deg,#AD1457,#C2185B)}
.grad-gold{background:linear-gradient(135deg,#F57F17,#FFB300)}
.grad-slate{background:linear-gradient(135deg,#263238,#546E7A)}

/* ── LAYOUT ─────────────────────────────────────────── */
#app{display:flex;flex-direction:column;min-height:100%;position:relative}
.screen{display:none;flex-direction:column;flex:1;
  padding-bottom:calc(var(--nav-h) + var(--safe-bottom));
  min-height:calc(100dvh - var(--nav-h));}
.screen.active{display:flex}
.scroll-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}

/* ── HEADER ─────────────────────────────────────────── */
.app-header{
  position:sticky;top:0;z-index:100;
  height:var(--header-h);
  display:flex;align-items:center;gap:12px;
  padding:0 16px;
  background:var(--bg);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
}
.app-header.transparent{background:transparent;border-color:transparent}
.header-back{width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:var(--bg-subtle);color:var(--text-2);flex-shrink:0}
.header-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:17px;font-weight:700;
  color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.header-actions{display:flex;gap:8px;flex-shrink:0}
.header-icon-btn{width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:var(--bg-subtle);color:var(--text-2)}

/* ── BOTTOM NAV ─────────────────────────────────────── */
#bottom-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  height:calc(var(--nav-h) + var(--safe-bottom));
  padding-bottom:var(--safe-bottom);
  background:var(--bg-card);
  border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-around;
  box-shadow:0 -4px 20px rgba(6,24,38,0.06);
}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;
  gap:3px;padding:8px 0;color:var(--text-muted);transition:color .2s;font-size:11px;
  font-weight:500}
.nav-item.active{color:var(--accent)}
.nav-item svg{width:22px;height:22px}
.nav-fab{
  width:52px;height:52px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--teal));
  color:#fff;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 16px rgba(22,101,192,0.35);
  flex-shrink:0;margin-top:-16px;
  transition:transform .2s;
}
.nav-fab:active{transform:scale(0.94)}

/* ── CARDS ──────────────────────────────────────────── */
.card{background:var(--bg-card);border-radius:var(--radius);
  box-shadow:var(--shadow);border:1px solid var(--border);overflow:hidden}
.card-body{padding:16px}

/* ── TRIP CARD ──────────────────────────────────────── */
.trip-card{position:relative;border-radius:var(--radius-lg);overflow:hidden;
  min-height:140px;cursor:pointer;color:#fff;box-shadow:var(--shadow-lg)}
.trip-card-inner{padding:20px;display:flex;flex-direction:column;
  justify-content:flex-end;min-height:140px;
  background:linear-gradient(180deg,rgba(0,0,0,0) 30%,rgba(0,0,0,0.45) 100%)}
.trip-card-name{font-family:'Plus Jakarta Sans',sans-serif;font-size:20px;
  font-weight:700;line-height:1.2;margin-bottom:4px}
.trip-card-sub{font-size:13px;opacity:0.85;display:flex;align-items:center;gap:6px}
.trip-card-badge{position:absolute;top:12px;right:12px;
  background:rgba(255,255,255,0.2);backdrop-filter:blur(8px);
  border-radius:20px;padding:4px 10px;font-size:11px;font-weight:600;
  text-transform:uppercase;letter-spacing:0.05em}

/* ── ITEM CARD ──────────────────────────────────────── */
.item-card{
  display:flex;gap:12px;padding:14px 16px;
  background:var(--bg-card);border-radius:var(--radius);
  border:1px solid var(--border);cursor:pointer;
  transition:box-shadow .2s;
}
.item-card:active{box-shadow:var(--shadow)}
.item-icon{width:40px;height:40px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0}
.item-body{flex:1;min-width:0}
.item-title{font-weight:500;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.item-meta{font-size:13px;color:var(--text-3);display:flex;
  align-items:center;gap:8px;flex-wrap:wrap}
.item-time{font-family:'DM Mono',monospace;font-size:13px;
  color:var(--accent);font-weight:500}
.item-star{color:var(--text-muted);flex-shrink:0;
  transition:color .2s;padding:2px}
.item-star.active{color:#FFB300}

/* ── TYPE BADGE ─────────────────────────────────────── */
.type-badge{display:inline-flex;align-items:center;gap:5px;
  border-radius:20px;padding:4px 10px;font-size:12px;font-weight:600;
  text-transform:uppercase;letter-spacing:0.04em;color:#fff}

/* ── TIMELINE ───────────────────────────────────────── */
.timeline{padding:0 16px;display:flex;flex-direction:column;gap:0}
.timeline-day{margin-bottom:8px}
.timeline-day-label{
  font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;
  font-size:14px;color:var(--text-3);text-transform:uppercase;
  letter-spacing:0.07em;padding:16px 0 8px;
  display:flex;align-items:center;gap:10px;
}
.timeline-day-label::after{content:'';flex:1;height:1px;background:var(--border)}
.timeline-items{display:flex;flex-direction:column;gap:8px}
.timeline-connector{width:2px;height:8px;background:var(--border);
  margin-left:19px;/* aligns with center of icon */}

/* ── CALENDAR ───────────────────────────────────────── */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;padding:8px 12px}
.cal-header{display:grid;grid-template-columns:repeat(7,1fr);
  padding:8px 12px 4px;gap:2px}
.cal-dow{text-align:center;font-size:11px;font-weight:600;
  color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em}
.cal-day{min-height:52px;border-radius:var(--radius-sm);
  display:flex;flex-direction:column;align-items:center;padding:6px 4px;
  cursor:pointer;gap:3px;transition:background .15s;position:relative}
.cal-day:hover{background:var(--bg-subtle)}
.cal-day.today .cal-num{background:var(--accent);color:#fff;border-radius:50%;
  width:24px;height:24px;display:flex;align-items:center;justify-content:center}
.cal-day.selected{background:var(--bg-subtle);outline:2px solid var(--accent)}
.cal-day.other-month{opacity:0.35}
.cal-num{font-size:13px;font-weight:500;line-height:24px;
  min-width:24px;text-align:center}
.cal-dots{display:flex;gap:2px;flex-wrap:wrap;justify-content:center;
  max-width:100%;overflow:hidden}
.cal-dot{width:5px;height:5px;border-radius:50%}

/* ── FORMS ──────────────────────────────────────────── */
.form-section{padding:20px 16px;display:flex;flex-direction:column;gap:16px}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-label{font-size:13px;font-weight:600;color:var(--text-2);
  text-transform:uppercase;letter-spacing:0.05em}
.form-input{background:var(--bg-subtle);border:1.5px solid var(--border);
  border-radius:var(--radius-sm);padding:12px 14px;
  font-size:15px;color:var(--text);width:100%;
  transition:border-color .2s;}
.form-input:focus{border-color:var(--accent)}
.form-input::placeholder{color:var(--text-muted)}
textarea.form-input{resize:vertical;min-height:88px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* ── TAG INPUT ──────────────────────────────────────── */
.tag-input-wrap{background:var(--bg-subtle);border:1.5px solid var(--border);
  border-radius:var(--radius-sm);padding:8px 12px;
  display:flex;flex-wrap:wrap;gap:6px;cursor:text;
  transition:border-color .2s;}
.tag-input-wrap:focus-within{border-color:var(--accent)}
.tag-chip{background:var(--accent);color:#fff;border-radius:20px;
  padding:3px 10px;font-size:13px;font-weight:500;
  display:flex;align-items:center;gap:5px}
.tag-chip button{opacity:0.75;font-size:14px;line-height:1}
.tag-input-field{border:none;background:transparent;outline:none;
  font-size:14px;color:var(--text);min-width:80px;flex:1;padding:3px 0}

/* ── COLOR PICKER ───────────────────────────────────── */
.color-picker{display:flex;gap:10px;flex-wrap:wrap}
.color-swatch{width:40px;height:40px;border-radius:50%;cursor:pointer;
  transition:transform .2s,box-shadow .2s;border:3px solid transparent}
.color-swatch.selected{transform:scale(1.12);
  box-shadow:0 0 0 3px var(--bg),0 0 0 5px var(--accent)}

/* ── TYPE SELECTOR ──────────────────────────────────── */
.type-selector{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.type-btn{border:2px solid var(--border);border-radius:var(--radius-sm);
  padding:10px 8px;display:flex;flex-direction:column;
  align-items:center;gap:5px;font-size:13px;font-weight:500;
  cursor:pointer;transition:all .2s;background:var(--bg-subtle);color:var(--text-2)}
.type-btn.selected{color:#fff;border-color:transparent}
.type-btn span:first-child{font-size:20px}

/* ── BUTTONS ────────────────────────────────────────── */
.btn{display:inline-flex;align-items:center;justify-content:center;
  gap:7px;border-radius:var(--radius-sm);padding:12px 20px;
  font-size:15px;font-weight:600;cursor:pointer;
  transition:all .18s;border:none}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:active{filter:brightness(0.9)}
.btn-ghost{background:var(--bg-subtle);color:var(--text-2);
  border:1.5px solid var(--border)}
.btn-ghost:active{background:var(--border)}
.btn-danger{background:#FFEBEE;color:#C62828}
[data-theme="dark"] .btn-danger{background:#2D0A0A;color:#EF9A9A}
.btn-full{width:100%;display:flex}
.btn-sm{padding:8px 14px;font-size:13px}
.btn-icon{width:40px;height:40px;padding:0;border-radius:var(--radius-sm)}

/* ── FAB ────────────────────────────────────────────── */
.fab-float{
  position:fixed;right:20px;z-index:150;
  width:52px;height:52px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--teal));
  color:#fff;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 20px rgba(22,101,192,0.4);
  transition:transform .2s;
}
.fab-float:active{transform:scale(0.93)}

/* ── CHECKLIST ──────────────────────────────────────── */
.progress-bar-wrap{background:var(--bg-subtle);border-radius:20px;
  height:8px;overflow:hidden;margin-bottom:4px}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--teal));
  border-radius:20px;transition:width .4s ease}
.checklist-item{display:flex;align-items:center;gap:12px;
  padding:14px 0;border-bottom:1px solid var(--border)}
.checklist-item:last-child{border-bottom:none}
.check-box{width:22px;height:22px;border-radius:6px;
  border:2px solid var(--border);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .18s}
.check-box.done{background:var(--accent);border-color:var(--accent);color:#fff}
.check-text{flex:1;font-size:15px;color:var(--text)}
.check-text.done{text-decoration:line-through;color:var(--text-muted)}
.check-del{color:var(--text-muted);padding:4px;font-size:16px}

/* ── ATTACHMENT GRID ────────────────────────────────── */
.attach-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:8px}
.attach-thumb{position:relative;border-radius:var(--radius-sm);overflow:hidden;
  aspect-ratio:1;cursor:pointer;background:var(--bg-subtle);
  display:flex;align-items:center;justify-content:center}
.attach-thumb img{width:100%;height:100%;object-fit:cover}
.attach-thumb-del{position:absolute;top:4px;right:4px;
  background:rgba(0,0,0,0.55);color:#fff;border-radius:50%;
  width:20px;height:20px;font-size:12px;
  display:flex;align-items:center;justify-content:center}
.attach-pdf{flex-direction:column;gap:4px;padding:8px;
  border:1.5px dashed var(--border)}
.attach-pdf-icon{font-size:24px}
.attach-pdf-name{font-size:10px;color:var(--text-3);text-align:center;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;width:100%}

/* ── DETAIL ─────────────────────────────────────────── */
.detail-section{padding:16px}
.detail-section+.detail-section{border-top:1px solid var(--border)}
.detail-label{font-size:11px;font-weight:700;color:var(--text-muted);
  text-transform:uppercase;letter-spacing:0.07em;margin-bottom:6px}
.detail-value{font-size:15px;color:var(--text)}
.detail-mono{font-family:'DM Mono',monospace;font-size:16px;
  font-weight:500;color:var(--text);letter-spacing:0.04em;
  background:var(--bg-subtle);border-radius:var(--radius-sm);
  padding:10px 14px;border:1px solid var(--border)}
.url-chip{display:inline-flex;align-items:center;gap:5px;
  background:var(--bg-subtle);border:1px solid var(--border);
  border-radius:20px;padding:5px 12px;font-size:13px;
  color:var(--accent);margin:3px;cursor:pointer}

/* ── HERO ───────────────────────────────────────────── */
.trip-hero{position:relative;color:#fff;overflow:hidden;min-height:180px;
  display:flex;flex-direction:column;justify-content:flex-end}
.trip-hero-content{padding:20px;position:relative;z-index:1}
.trip-hero-name{font-family:'Plus Jakarta Sans',sans-serif;font-size:26px;
  font-weight:700;line-height:1.2;margin-bottom:4px}
.trip-hero-sub{font-size:14px;opacity:0.85}
.trip-hero-actions{display:flex;gap:8px;padding:12px 16px 4px;flex-wrap:wrap}
.trip-hero-btn{background:rgba(255,255,255,0.92);backdrop-filter:blur(8px);
  border:none;color:#061826;border-radius:20px;
  padding:8px 16px;font-size:13px;font-weight:700;
  display:flex;align-items:center;gap:5px;
  box-shadow:0 2px 8px rgba(0,0,0,0.15)}

/* ── DAY TABS ───────────────────────────────────────── */
.day-tabs{display:flex;gap:6px;padding:12px 16px;overflow-x:auto;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;flex-shrink:0}
.day-tabs::-webkit-scrollbar{display:none}
.day-tab{flex-shrink:0;display:flex;flex-direction:column;align-items:center;
  padding:8px 14px;border-radius:var(--radius-sm);border:1.5px solid var(--border);
  background:var(--bg-card);cursor:pointer;transition:all .2s;min-width:56px}
.day-tab.active{background:var(--accent);border-color:var(--accent);color:#fff}
.day-tab-num{font-family:'Plus Jakarta Sans',sans-serif;font-size:18px;font-weight:700}
.day-tab-dow{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;
  opacity:0.75}

/* ── VIEW TOGGLE ────────────────────────────────────── */
.view-toggle{display:flex;background:var(--bg-subtle);border-radius:var(--radius-sm);
  padding:3px;border:1px solid var(--border)}
.view-toggle-btn{flex:1;padding:7px;border-radius:6px;font-size:13px;
  font-weight:600;color:var(--text-3);transition:all .2s;
  display:flex;align-items:center;justify-content:center;gap:5px}
.view-toggle-btn.active{background:var(--bg-card);color:var(--text);
  box-shadow:var(--shadow)}

/* ── SETTINGS ROWS ──────────────────────────────────── */
.settings-group{padding:16px;display:flex;flex-direction:column}
.settings-label{font-size:11px;font-weight:700;color:var(--text-muted);
  text-transform:uppercase;letter-spacing:0.07em;padding:8px 0 6px}
.settings-row{display:flex;align-items:center;justify-content:space-between;
  padding:14px 0;border-bottom:1px solid var(--border)}
.settings-row:last-child{border-bottom:none}
.settings-row-left{display:flex;flex-direction:column;gap:2px}
.settings-row-title{font-size:15px;font-weight:500;color:var(--text)}
.settings-row-sub{font-size:13px;color:var(--text-3)}

/* ── TOGGLE SWITCH ──────────────────────────────────── */
.toggle{width:48px;height:28px;border-radius:14px;
  background:var(--border);position:relative;cursor:pointer;
  transition:background .25s;flex-shrink:0}
.toggle.on{background:var(--accent)}
.toggle::after{content:'';position:absolute;top:3px;left:3px;
  width:22px;height:22px;border-radius:50%;background:#fff;
  transition:transform .25s;box-shadow:0 1px 4px rgba(0,0,0,0.2)}
.toggle.on::after{transform:translateX(20px)}

/* ── MAP ────────────────────────────────────────────── */
#leaflet-map{height:220px;border-radius:var(--radius);overflow:hidden;
  border:1px solid var(--border)}

/* ── TOAST ──────────────────────────────────────────── */
#toast-container{position:fixed;bottom:calc(var(--nav-h) + var(--safe-bottom) + 12px);
  left:50%;transform:translateX(-50%);z-index:999;
  display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none}
.toast{background:var(--text);color:var(--bg);border-radius:var(--radius-sm);
  padding:10px 18px;font-size:14px;font-weight:500;
  box-shadow:var(--shadow-lg);opacity:0;
  transform:translateY(8px);pointer-events:none;
  transition:opacity .25s,transform .25s;white-space:nowrap}
.toast.show{opacity:1;transform:translateY(0)}

/* ── MODAL ──────────────────────────────────────────── */
.modal-overlay{position:fixed;inset:0;z-index:500;
  background:rgba(6,24,38,0.6);backdrop-filter:blur(4px);
  display:none;align-items:flex-end;justify-content:center;padding:0}
.modal-overlay.show{display:flex}
.modal{background:var(--bg-card);border-radius:var(--radius-lg) var(--radius-lg) 0 0;
  width:100%;max-width:560px;padding:20px 20px calc(20px + var(--safe-bottom));
  box-shadow:var(--shadow-lg);max-height:90dvh;overflow-y:auto}
.modal-handle{width:36px;height:4px;border-radius:2px;
  background:var(--border);margin:0 auto 16px}
.modal-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:18px;
  font-weight:700;margin-bottom:16px}

/* ── IMAGE OVERLAY ──────────────────────────────────── */
#img-overlay{position:fixed;inset:0;z-index:600;
  background:rgba(0,0,0,0.92);display:none;
  align-items:center;justify-content:center}
#img-overlay.show{display:flex}
#img-overlay img{max-width:96vw;max-height:92dvh;
  object-fit:contain;border-radius:var(--radius-sm)}
#img-overlay-close{position:absolute;top:16px;right:16px;
  width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.15);
  color:#fff;font-size:20px;display:flex;align-items:center;justify-content:center}

/* ── EMPTY STATE ────────────────────────────────────── */
.empty-state{display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:60px 24px;gap:16px;flex:1;text-align:center}
.empty-icon{font-size:52px;opacity:0.45}
.empty-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:18px;
  font-weight:700;color:var(--text-2)}
.empty-sub{font-size:14px;color:var(--text-3);max-width:240px}

/* ── HOME HERO ──────────────────────────────────────── */
.home-hero{position:relative;min-height:200px;color:#fff;overflow:hidden;
  display:flex;flex-direction:column;justify-content:flex-end}
.home-hero-content{position:relative;z-index:1;padding:20px}
.home-greeting{font-size:13px;opacity:0.8;margin-bottom:2px}
.home-trip-name{font-family:'Plus Jakarta Sans',sans-serif;font-size:22px;
  font-weight:700;line-height:1.2}
.home-trip-sub{font-size:13px;opacity:0.8;margin-top:4px}
.wave-divider{display:block;width:100%;margin-bottom:-2px;position:relative;z-index:1}
.today-section{padding:16px}
.today-label{font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;
  font-weight:700;color:var(--text-2);margin-bottom:12px;
  display:flex;align-items:center;gap:8px}

/* ── URL LIST ───────────────────────────────────────── */
.url-row{display:flex;gap:8px;align-items:center}
.url-row .form-input{flex:1}
.url-del-btn{color:var(--text-muted);font-size:20px;padding:4px;flex-shrink:0}

/* ── SECTION TITLE ──────────────────────────────────── */
.section-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;
  font-weight:700;color:var(--text-2);padding:16px 16px 8px;
  display:flex;align-items:center;justify-content:space-between}

/* ── UPCOMING ITEMS ─────────────────────────────────── */
.upcoming-section{padding:0 16px 16px}
.upcoming-label{font-size:11px;font-weight:700;color:var(--text-muted);
  text-transform:uppercase;letter-spacing:0.07em;padding:8px 0}

/* ── TRIP GROUPS ─────────────────────────────────────── */
.trips-section{padding:8px 16px 12px}
.trips-group-label{font-size:11px;font-weight:700;color:var(--text-muted);
  text-transform:uppercase;letter-spacing:0.07em;padding:12px 0 8px}
.trips-list{display:flex;flex-direction:column;gap:12px}

/* ── ABOUT ───────────────────────────────────────────── */
.about-logo{font-family:'Plus Jakarta Sans',sans-serif;font-size:28px;
  font-weight:700;color:var(--accent)}
.about-version{font-size:13px;color:var(--text-3);margin-top:4px}

/* ── RESPONSIVE ─────────────────────────────────────── */
@media (min-width:600px){
  .screen{max-width:560px;margin:0 auto}
  #bottom-nav{justify-content:center;gap:0}
  #bottom-nav .nav-item{max-width:120px}
  .fab-float{right:calc(50% - 280px + 20px)}
}
@media (prefers-reduced-motion:reduce){
  *{transition:none!important;animation:none!important}
}

/* ── SHARE SCREEN ────────────────────────────────────── */
.share-section{padding:20px 16px}
.share-section p{font-size:14px;color:var(--text-3);line-height:1.6}
.share-pre{background:var(--bg-subtle);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:14px;font-size:13px;
  font-family:'DM Mono',monospace;white-space:pre-wrap;word-break:break-all;
  max-height:200px;overflow-y:auto;color:var(--text-2);margin:12px 0}

/* ── IMPORT ZONE ─────────────────────────────────────── */
.import-zone{border:2px dashed var(--border);border-radius:var(--radius);
  padding:32px 20px;text-align:center;cursor:pointer;
  transition:border-color .2s,background .2s;color:var(--text-3)}
.import-zone:hover,.import-zone.drag-over{border-color:var(--accent);
  background:var(--bg-subtle);color:var(--accent)}
.import-zone-icon{font-size:32px;margin-bottom:8px}

/* ── ITEM DETAIL HERO ────────────────────────────────── */
.item-hero{padding:20px 16px 16px;display:flex;flex-direction:column;gap:10px}
.item-hero-title{font-family:'Plus Jakarta Sans',sans-serif;
  font-size:22px;font-weight:700;color:var(--text);line-height:1.3}
.item-hero-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}

/* ── NOTIFICATION BANNER ─────────────────────────────── */
.notif-banner{background:var(--bg-subtle);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:12px 14px;
  display:flex;align-items:center;gap:10px;font-size:13px;color:var(--text-3)}

/* ── ONBOARDING ──────────────────────────────────────── */
#screen-onboard{position:fixed;inset:0;z-index:900;
  background:var(--bg);padding-bottom:0;display:none;flex-direction:column}
#screen-onboard.active{display:flex}
.ob-slides{flex:1;overflow:hidden;position:relative}
.ob-slide{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:40px 32px 32px;text-align:center;color:#fff;
  transition:transform .4s cubic-bezier(.4,0,.2,1);
}
.ob-illustration{font-size:88px;margin-bottom:28px;
  filter:drop-shadow(0 8px 24px rgba(0,0,0,0.18));
  animation:ob-float 3s ease-in-out infinite}
@keyframes ob-float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
}
.ob-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:26px;
  font-weight:700;line-height:1.2;margin-bottom:12px}
.ob-body{font-size:16px;opacity:0.88;line-height:1.6;max-width:300px}
.ob-footer{padding:24px 24px calc(24px + var(--safe-bottom));
  display:flex;flex-direction:column;gap:16px;align-items:center;
  background:var(--bg-card)}
.ob-dots{display:flex;gap:8px;align-items:center}
.ob-dot{width:8px;height:8px;border-radius:50%;
  background:var(--border);transition:all .3s;cursor:pointer}
.ob-dot.active{width:24px;border-radius:4px;background:var(--accent)}
.ob-btn-row{display:flex;gap:10px;width:100%}
.ob-btn{flex:1;padding:15px;border-radius:var(--radius-sm);
  font-size:16px;font-weight:700;cursor:pointer;border:none;
  transition:all .18s}
.ob-btn-primary{background:var(--accent);color:#fff}
.ob-btn-ghost{background:var(--bg-subtle);color:var(--text-3);
  border:1.5px solid var(--border);font-size:14px;flex:0 0 auto;padding:15px 20px}
.ob-skip{font-size:13px;color:var(--text-muted);padding:4px 8px;
  background:none;border:none;cursor:pointer}

/* ── AI PLANNER ──────────────────────────────────────── */
.ai-hero{background:linear-gradient(135deg,#4527A0,#1665C0);
  color:#fff;padding:32px 20px 24px;text-align:center;position:relative;overflow:hidden}
.ai-hero::after{content:'✨';position:absolute;right:-10px;top:-10px;
  font-size:120px;opacity:0.07}
.ai-hero-icon{font-size:52px;margin-bottom:12px}
.ai-hero-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:22px;
  font-weight:700;margin-bottom:6px}
.ai-hero-sub{font-size:14px;opacity:0.85;line-height:1.5;max-width:280px;margin:0 auto}
.ai-pill-row{display:flex;gap:8px;flex-wrap:wrap}
.ai-pill{padding:9px 16px;border-radius:var(--radius-sm);
  border:1.5px solid var(--border);background:var(--bg-subtle);
  font-size:14px;font-weight:600;color:var(--text-3);cursor:pointer;
  transition:all .18s;white-space:nowrap}
.ai-pill.selected{background:var(--accent);color:#fff;border-color:var(--accent)}
.ai-pill.style{flex:1;text-align:center}
.ai-pill.interest{border-radius:20px;font-size:13px}
.btn-ai{background:linear-gradient(135deg,#4527A0,#1665C0);color:#fff;
  border-radius:var(--radius-sm);padding:15px;font-size:16px;font-weight:700;
  display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;border:none;cursor:pointer;transition:filter .2s;margin-top:8px}
.btn-ai:active{filter:brightness(0.9)}
.btn-ai:disabled{opacity:0.45;cursor:not-allowed;filter:none}
.ai-loading{display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:60px 24px;gap:16px;text-align:center}
.ai-spinner{width:48px;height:48px;border:3px solid var(--border);
  border-top-color:var(--accent);border-radius:50%;
  animation:spin 0.8s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.ai-loading-msg{font-size:15px;color:var(--text-3);font-weight:500}
.ai-result-day{padding:12px 16px;border-bottom:1px solid var(--border)}
.ai-result-day:last-child{border-bottom:none}
.ai-result-day-label{font-size:12px;font-weight:700;color:var(--text-muted);
  text-transform:uppercase;letter-spacing:0.07em;margin-bottom:8px}
.ai-result-item{display:flex;align-items:center;gap:10px;
  padding:6px 0;font-size:14px;color:var(--text-2)}
.ai-result-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ai-key-card{background:var(--bg-subtle);border:1.5px solid var(--border);
  border-radius:var(--radius);padding:16px;margin-bottom:12px}
/* FAB choice sheet */
.fab-choice-overlay{position:fixed;inset:0;z-index:500;
  background:rgba(6,24,38,0.55);backdrop-filter:blur(4px);
  display:none;align-items:flex-end;justify-content:center}
.fab-choice-overlay.show{display:flex}
.fab-choice-sheet{background:var(--bg-card);
  border-radius:var(--radius-lg) var(--radius-lg) 0 0;
  width:100%;max-width:560px;
  padding:20px 20px calc(20px + var(--safe-bottom));
  box-shadow:var(--shadow-lg)}
.fab-choice-title{font-family:'Plus Jakarta Sans',sans-serif;
  font-size:16px;font-weight:700;margin-bottom:14px;color:var(--text)}
.fab-choice-btn{display:flex;align-items:center;gap:14px;
  padding:14px;border-radius:var(--radius);
  background:var(--bg-subtle);border:1.5px solid var(--border);
  width:100%;cursor:pointer;transition:all .2s;margin-bottom:10px;text-align:left}
.fab-choice-btn:last-child{margin-bottom:0}
.fab-choice-btn:active{background:var(--border)}
.fab-choice-icon{width:44px;height:44px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.fab-choice-text{display:flex;flex-direction:column;gap:2px}
.fab-choice-label{font-weight:600;font-size:15px;color:var(--text)}
.fab-choice-sub{font-size:12px;color:var(--text-3)}
</style>
</head>
<body>
<div id="app">

  <!-- ── SCREENS ─────────────────────────────────────── -->

  <!-- ONBOARDING -->
  <div id="screen-onboard" class="screen">
    <div class="ob-slides" id="ob-slides-wrap"></div>
    <div class="ob-footer">
      <div class="ob-dots" id="ob-dots"></div>
      <div class="ob-btn-row">
        <button class="ob-btn ob-btn-ghost" id="ob-back-btn" onclick="obPrev()" style="display:none">← Back</button>
        <button class="ob-btn ob-btn-primary" id="ob-next-btn" onclick="obNext()">Next →</button>
      </div>
      <button class="ob-skip" id="ob-skip-btn" onclick="completeOnboarding()">Skip intro</button>
    </div>
  </div>

  <!-- HOME -->
  <div id="screen-home" class="screen active">
    <div class="scroll-body" id="home-scroll"></div>
  </div>

  <!-- TRIPS -->
  <div id="screen-trips" class="screen">
    <div class="app-header">
      <span class="header-title">My Trips</span>
      <div class="header-actions">
        <button class="header-icon-btn" id="trips-sort-btn" title="Sort">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M7 12h10M11 18h2"/></svg>
        </button>
      </div>
    </div>
    <div class="scroll-body" id="trips-scroll"></div>
  </div>

  <!-- TRIP DETAIL -->
  <div id="screen-trip" class="screen">
    <div id="trip-detail-root"></div>
  </div>

  <!-- ITEM DETAIL -->
  <div id="screen-item" class="screen">
    <div class="app-header" id="item-header">
      <button class="header-back" onclick="goBack()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      </button>
      <span class="header-title" id="item-header-title">Item</span>
      <div class="header-actions">
        <button class="header-icon-btn" id="item-fav-btn" title="Favourite">⭐</button>
        <button class="header-icon-btn" id="item-edit-btn" title="Edit">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
      </div>
    </div>
    <div class="scroll-body" id="item-detail-root"></div>
  </div>

  <!-- EDIT TRIP -->
  <div id="screen-edit-trip" class="screen">
    <div class="app-header">
      <button class="header-back" onclick="goBack()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      </button>
      <span class="header-title" id="edit-trip-header-title">New Trip</span>
      <div class="header-actions">
        <button class="btn btn-primary btn-sm" id="save-trip-btn">Save</button>
      </div>
    </div>
    <div class="scroll-body" id="edit-trip-form"></div>
  </div>

  <!-- EDIT ITEM -->
  <div id="screen-edit-item" class="screen">
    <div class="app-header">
      <button class="header-back" onclick="goBack()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      </button>
      <span class="header-title" id="edit-item-header-title">New Item</span>
      <div class="header-actions">
        <button class="btn btn-primary btn-sm" id="save-item-btn">Save</button>
      </div>
    </div>
    <div class="scroll-body" id="edit-item-form"></div>
  </div>

  <!-- CHECKLIST -->
  <div id="screen-checklist" class="screen">
    <div class="app-header">
      <button class="header-back" onclick="goBack()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      </button>
      <span class="header-title" id="checklist-header-title">Checklist</span>
    </div>
    <div class="scroll-body" id="checklist-root"></div>
  </div>

  <!-- SETTINGS -->
  <div id="screen-settings" class="screen">
    <div class="app-header">
      <span class="header-title">Settings</span>
    </div>
    <div class="scroll-body" id="settings-root"></div>
  </div>

  <!-- SHARE -->
  <div id="screen-share" class="screen">
    <div class="app-header">
      <button class="header-back" onclick="goBack()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      </button>
      <span class="header-title">Share Trip</span>
    </div>
    <div class="scroll-body" id="share-root"></div>
  </div>

  <!-- AI PLANNER -->
  <div id="screen-ai-planner" class="screen">
    <div class="app-header">
      <button class="header-back" onclick="goBack()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      </button>
      <span class="header-title">✨ AI Trip Planner</span>
    </div>
    <div class="scroll-body" id="ai-planner-body"></div>
  </div>

  <!-- BOTTOM NAV -->
  <nav id="bottom-nav">
    <button class="nav-item active" data-nav="home" onclick="navigate('home')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
      <span>Today</span>
    </button>
    <button class="nav-item" data-nav="trips" onclick="navigate('trips')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/></svg>
      <span>Trips</span>
    </button>
    <button class="nav-fab" id="main-fab" onclick="handleFab()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
    </button>
    <button class="nav-item" data-nav="settings" onclick="navigate('settings')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      <span>Settings</span>
    </button>
  </nav>


</div>

<!-- ── FAB CHOICE ─────────────────────────────────────── -->
<div class="fab-choice-overlay" id="fab-choice-overlay" onclick="if(event.target===this)closeFabChoice()">
  <div class="fab-choice-sheet">
    <div class="fab-choice-title">Add to TripBinder</div>
    <button class="fab-choice-btn" onclick="closeFabChoice();navigate('ai-planner',{})">
      <div class="fab-choice-icon" style="background:linear-gradient(135deg,#4527A0,#1665C0);color:#fff">✨</div>
      <div class="fab-choice-text">
        <span class="fab-choice-label">Generate with AI</span>
        <span class="fab-choice-sub">Describe your trip — AI builds the itinerary</span>
      </div>
    </button>
    <button class="fab-choice-btn" onclick="closeFabChoice();navigate('edit-trip',{editTripId:null})">
      <div class="fab-choice-icon" style="background:var(--bg-subtle)">✏️</div>
      <div class="fab-choice-text">
        <span class="fab-choice-label">Plan manually</span>
        <span class="fab-choice-sub">Build your itinerary step by step</span>
      </div>
    </button>
  </div>
</div>

<!-- ── TOAST ─────────────────────────────────────────── -->
<div id="toast-container"></div>

<!-- ── IMAGE OVERLAY ──────────────────────────────────── -->
<div id="img-overlay" onclick="closeImgOverlay()">
  <button id="img-overlay-close" onclick="closeImgOverlay()">✕</button>
  <img id="img-overlay-img" src="" alt="">
</div>

<!-- ── DELETE MODAL ───────────────────────────────────── -->
<div class="modal-overlay" id="delete-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="delete-modal-title">Delete this item?</div>
    <p style="font-size:14px;color:var(--text-3);margin-bottom:20px" id="delete-modal-body">This action cannot be undone.</p>
    <div style="display:flex;gap:10px">
      <button class="btn btn-ghost btn-full" onclick="closeDeleteModal()">Cancel</button>
      <button class="btn btn-danger btn-full" id="delete-modal-confirm">Delete</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
'use strict';

/* ══════════════════════════════════════════════════════
   TRAVEL TOOLKIT — update URLs after deploying
══════════════════════════════════════════════════════ */
const TOOLKIT = {
  hub:      'https://leanlifestyle19-cmyk.github.io/Toolkit/',
  packlist: 'https://leanlifestyle19-cmyk.github.io/Packlist/',
  divvy:    'https://leanlifestyle19-cmyk.github.io/Divvy/',
  wayfarer: 'https://leanlifestyle19-cmyk.github.io/TripBinder/',
};

function toolkitBannerHTML(currentApp) {
  const apps = [
    { key:'wayfarer', icon:'✈️', name:'TripBinder',  color:'linear-gradient(135deg,#1665C0,#0698A0)', url: TOOLKIT.wayfarer },
    { key:'packlist', icon:'🎒', name:'PackList',  color:'linear-gradient(135deg,#1B5E20,#00695C)', url: TOOLKIT.packlist },
    { key:'divvy',    icon:'💸', name:'Divvy',     color:'linear-gradient(135deg,#AD1457,#6A1B9A)', url: TOOLKIT.divvy    },
  ].filter(a => a.key !== currentApp);

  return `
  <div style="padding:16px 16px 24px">
    <div style="font-size:11px;font-weight:700;color:var(--text-muted);
      text-transform:uppercase;letter-spacing:0.07em;margin-bottom:10px">
      🗺️ Also in Travel Toolkit
    </div>
    <div style="display:flex;gap:8px">
      ${apps.map(a => `
      <a href="${a.url}" target="_blank" style="flex:1;border-radius:12px;overflow:hidden;
        text-decoration:none;box-shadow:var(--shadow);cursor:pointer">
        <div style="background:${a.color};padding:12px 14px;
          display:flex;align-items:center;gap:8px;color:#fff">
          <span style="font-size:20px">${a.icon}</span>
          <span style="font-family:'Plus Jakarta Sans',sans-serif;
            font-size:13px;font-weight:700">${a.name}</span>
        </div>
      </a>`).join('')}
    </div>
    <div style="text-align:center;margin-top:10px">
      <a href="${TOOLKIT.hub}" target="_blank"
        style="font-size:12px;color:var(--text-muted);font-weight:500">
        View Travel Toolkit bundle →
      </a>
    </div>
  </div>`;
}

/* ══════════════════════════════════════════════════════
   ONBOARDING
══════════════════════════════════════════════════════ */

  {

let obIndex = 0;

function renderOnboarding() {
  const wrap    = document.getElementById('ob-slides-wrap');
  const dots    = document.getElementById('ob-dots');
  const backBtn = document.getElementById('ob-back-btn');
  const nextBtn = document.getElementById('ob-next-btn');
  const skipBtn = document.getElementById('ob-skip-btn');
  const isLast  = obIndex === OB_SLIDES.length - 1;

  wrap.innerHTML = OB_SLIDES.map((s, i) => `
    <div class="ob-slide" style="background:${s.grad};
      transform:translateX(${(i - obIndex) * 100}%)">
      <div class="ob-illustration">${s.icon}</div>
      <div class="ob-title">${s.title}</div>
      <div class="ob-body">${s.body}</div>
    </div>`).join('');

  dots.innerHTML = OB_SLIDES.map((_, i) =>
    `<div class="ob-dot ${i === obIndex ? 'active' : ''}" onclick="obGoTo(${i})"></div>`
  ).join('');

  backBtn.style.display = obIndex > 0 ? '' : 'none';
  nextBtn.textContent   = isLast ? '🚀 Get Started' : 'Next →';
  skipBtn.style.display = isLast ? 'none' : '';
}

function obNext() {
  if (obIndex < OB_SLIDES.length - 1) { obIndex++; renderOnboarding(); }
  else completeOnboarding();
}
function obPrev()  { if (obIndex > 0) { obIndex--; renderOnboarding(); } }
function obGoTo(i) { obIndex = i; renderOnboarding(); }

async function completeOnboarding() {
  await Settings.set('onboarded', true);
  document.getElementById('screen-onboard').classList.remove('active');
  navigate('home', {}, false);
}

async function replayIntro() {
  await Settings.set('onboarded', false);
  obIndex = 0;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-onboard').classList.add('active');
  renderOnboarding();
}

async function checkOnboarded() {
  const rec = await Settings.get('onboarded').catch(() => null);
  if (rec && rec.value) {
    navigate('home', {}, false);
  } else {
    obIndex = 0;
    document.getElementById('screen-onboard').classList.add('active');
    document.getElementById('screen-home').classList.remove('active');
    renderOnboarding();
  }
}

const DB_NAME = 'wayfarer';
const DB_VER  = 3;
let db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('trips')) {
        db.createObjectStore('trips', { keyPath: 'id' });
      }
      if (!db.objectStoreNames.contains('items')) {
        const is = db.createObjectStore('items', { keyPath: 'id' });
        is.createIndex('tripId', 'tripId');
        is.createIndex('date', 'date');
      }
      if (!db.objectStoreNames.contains('checklist')) {
        const cs = db.createObjectStore('checklist', { keyPath: 'id' });
        cs.createIndex('tripId', 'tripId');
      }
      if (!db.objectStoreNames.contains('settings')) {
        db.createObjectStore('settings', { keyPath: 'key' });
      }
    };
    req.onsuccess = (e) => { db = e.target.result; resolve(db); };
    req.onerror   = (e) => reject(e.target.error);
  });
}

function dbOp(store, mode, fn) {
  return new Promise((resolve, reject) => {
    const tx  = db.transaction(store, mode);
    const s   = tx.objectStore(store);
    const req = fn(s);
    if (req) {
      req.onsuccess = (e) => resolve(e.target.result);
      req.onerror   = (e) => reject(e.target.error);
    } else {
      tx.oncomplete = () => resolve();
      tx.onerror    = (e) => reject(e.target.error);
    }
  });
}

/* TRIPS */
const Trips = {
  getAll: ()      => dbOp('trips','readonly', s => s.getAll()),
  get:    (id)    => dbOp('trips','readonly', s => s.get(id)),
  put:    (trip)  => dbOp('trips','readwrite',s => s.put(trip)),
  delete: (id)    => dbOp('trips','readwrite',s => s.delete(id)),
};

/* ITEMS */
const Items = {
  getAll: ()       => dbOp('items','readonly', s => s.getAll()),
  get:    (id)     => dbOp('items','readonly', s => s.get(id)),
  put:    (item)   => dbOp('items','readwrite',s => s.put(item)),
  delete: (id)     => dbOp('items','readwrite',s => s.delete(id)),
  forTrip: (tripId) => new Promise((resolve, reject) => {
    const tx  = db.transaction('items','readonly');
    const idx = tx.objectStore('items').index('tripId');
    const req = idx.getAll(tripId);
    req.onsuccess = e => resolve(e.target.result);
    req.onerror   = e => reject(e.target.error);
  }),
};

/* CHECKLIST */
const Checklist = {
  getAll: ()         => dbOp('checklist','readonly', s => s.getAll()),
  get:    (id)       => dbOp('checklist','readonly', s => s.get(id)),
  put:    (item)     => dbOp('checklist','readwrite',s => s.put(item)),
  delete: (id)       => dbOp('checklist','readwrite',s => s.delete(id)),
  forTrip: (tripId)  => new Promise((resolve, reject) => {
    const tx  = db.transaction('checklist','readonly');
    const idx = tx.objectStore('checklist').index('tripId');
    const req = idx.getAll(tripId);
    req.onsuccess = e => resolve(e.target.result);
    req.onerror   = e => reject(e.target.error);
  }),
};

/* SETTINGS */
const Settings = {
  get: (key)        => dbOp('settings','readonly', s => s.get(key)),
  set: (key, value) => dbOp('settings','readwrite',s => s.put({ key, value })),
};

/* ══════════════════════════════════════════════════════
   UTILS
══════════════════════════════════════════════════════ */
function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

function fmtDate(d) {
  if (!d) return '';
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
}

function fmtDateShort(d) {
  if (!d) return '';
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('en-GB', { day:'numeric', month:'short' });
}

function fmtTime(t) {
  if (!t) return '';
  const [h, m] = t.split(':').map(Number);
  const ampm   = h >= 12 ? 'PM' : 'AM';
  const h12    = h % 12 || 12;
  return `${h12}:${String(m).padStart(2,'0')} ${ampm}`;
}

function fmtDuration(start, end) {
  if (!start || !end) return '';
  const s  = new Date(start + 'T00:00:00');
  const e  = new Date(end   + 'T00:00:00');
  const ms = e - s;
  const d  = Math.round(ms / 86400000);
  return d === 1 ? '1 day' : `${d} days`;
}

function localDateStr(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}

function datesBetween(start, end) {
  const arr = [];
  let cur = new Date(start + 'T00:00:00');
  const e  = new Date(end   + 'T00:00:00');
  while (cur <= e) {
    arr.push(localDateStr(cur));
    cur.setDate(cur.getDate() + 1);
  }
  return arr;
}

function today() {
  return localDateStr(new Date());
}

function greeting() {
  const h = new Date().getHours();
  if (h < 12) return 'Good morning';
  if (h < 17) return 'Good afternoon';
  return 'Good evening';
}

function typeIcon(type) {
  const map = { flight:'✈️', hotel:'🏨', activity:'📍', transport:'🚌', meal:'🍽️', other:'📌' };
  return map[type] || '📌';
}

function typeColor(type) {
  const map = {
    flight:'#1665C0', hotel:'#0698A0', activity:'#2E7D32',
    transport:'#6A1B9A', meal:'#E65100', other:'#37474F'
  };
  return map[type] || '#37474F';
}

function typeLabel(type) {
  return type ? type.charAt(0).toUpperCase() + type.slice(1) : 'Other';
}

function tripGradClass(color) {
  return color || 'grad-ocean';
}

function tripStatusLabel(trip) {
  const t = today();
  if (t >= trip.startDate && t <= trip.endDate) return 'Active';
  if (t < trip.startDate) return 'Upcoming';
  return 'Past';
}

function tripStatusColor(trip) {
  const s = tripStatusLabel(trip);
  if (s === 'Active') return '#2E7D32';
  if (s === 'Upcoming') return '#1665C0';
  return '#37474F';
}

function sanitize(str) {
  const d = document.createElement('div');
  d.textContent = str || '';
  return d.innerHTML;
}

function escHtml(s) { return sanitize(s); }

function showToast(msg, dur = 2800) {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  c.appendChild(t);
  requestAnimationFrame(() => {
    requestAnimationFrame(() => t.classList.add('show'));
  });
  setTimeout(() => {
    t.classList.remove('show');
    setTimeout(() => t.remove(), 300);
  }, dur);
}

function applyTheme(dark) {
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : '');
  document.getElementById('themeColorMeta')
    .setAttribute('content', dark ? '#061826' : '#1665C0');
  state.darkMode = dark;
}

async function loadTheme() {
  let dark = false;
  const rec = await Settings.get('darkMode').catch(() => null);
  if (rec !== null && rec !== undefined) {
    dark = rec.value;
  } else {
    dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  }
  applyTheme(dark);
}

async function toggleDarkMode() {
  const dark = !state.darkMode;
  applyTheme(dark);
  await Settings.set('darkMode', dark);
  renderSettings();
}

/* ══════════════════════════════════════════════════════
   NAVIGATION
══════════════════════════════════════════════════════ */
function navigate(screen, params = {}, addHistory = true) {
  // Destroy map if leaving
  if (state.leafletMap) {
    state.leafletMap.remove();
    state.leafletMap = null;
  }

  if (addHistory && state.screen !== screen) {
    state.history.push({ screen: state.screen, ...stateSnapshot() });
  }

  state.screen = screen;
  Object.assign(state, params);

  // Hide all screens
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById('screen-' + screen);
  if (el) {
    el.classList.add('active');
    el.querySelector('.scroll-body')?.scrollTo(0, 0);
  }

  // Update nav
  document.querySelectorAll('[data-nav]').forEach(b =>
    b.classList.toggle('active', b.dataset.nav === screen)
  );

  // Render
  const renders = {
    home:          renderHome,
    trips:         renderTrips,
    trip:          renderTrip,
    item:          renderItem,
    'edit-trip':   renderEditTrip,
    'edit-item':   renderEditItem,
    checklist:     renderChecklist,
    settings:      renderSettings,
    share:         renderShare,
    'ai-planner':  renderAiPlanner,
  };
  (renders[screen] || (() => {}))();
}

function stateSnapshot() {
  return {
    tripId: state.tripId,
    itemId: state.itemId,
    editTripId: state.editTripId,
    editItemId: state.editItemId,
    editItemTripId: state.editItemTripId,
    editItemDate: state.editItemDate,
    checklistTripId: state.checklistTripId,
    shareTripId: state.shareTripId,
    viewMode: state.viewMode,
    activeDay: state.activeDay,
    calMonth: state.calMonth,
  };
}

function goBack() {
  if (state.history.length === 0) {
    navigate('home', {}, false);
    return;
  }
  const prev = state.history.pop();
  navigate(prev.screen, prev, false);
}

async function renderHome() {
  const root = document.getElementById('home-scroll');
  root.innerHTML = '<div class="empty-state"><div class="empty-icon">🌊</div><div class="empty-title">Loading…</div></div>';

  const [trips, allItems] = await Promise.all([Trips.getAll(), Items.getAll()]);
  const t = today();

  // Find active or next upcoming trip
  let activeTrip = trips.find(tr => t >= tr.startDate && t <= tr.endDate);
  if (!activeTrip) {
    const upcoming = trips.filter(tr => tr.startDate > t)
      .sort((a,b) => a.startDate.localeCompare(b.startDate));
    activeTrip = upcoming[0] || null;
  }

  const todayItems = activeTrip
    ? allItems.filter(i => i.tripId === activeTrip.id && i.date === t)
        .sort((a,b) => (a.time||'').localeCompare(b.time||''))
    : [];

  const upcomingItems = activeTrip
    ? allItems.filter(i => i.tripId === activeTrip.id && i.date > t)
        .sort((a,b) => a.date.localeCompare(b.date) || (a.time||'').localeCompare(b.time||''))
        .slice(0, 5)
    : [];

  let html = '';

  if (activeTrip) {
    const grad = tripGradClass(activeTrip.color);
    const cities = (activeTrip.cities || []).join(' → ');
    const daysLeft = activeTrip.startDate > t
      ? `Starts ${fmtDateShort(activeTrip.startDate)}`
      : `Ends ${fmtDateShort(activeTrip.endDate)}`;

    html += `
    <div class="home-hero ${grad}" style="cursor:pointer" onclick="navigate('trip',{tripId:'${activeTrip.id}'})">
      <div class="home-hero-content">
        <div class="home-greeting">${greeting()}, Traveller · ${new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'})}</div>
        <div class="home-trip-name">${escHtml(activeTrip.name)}</div>
        <div class="home-trip-sub">${escHtml(cities)} · ${escHtml(daysLeft)}</div>
      </div>
      <svg class="wave-divider" viewBox="0 0 1440 56" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
        <path d="M0,32 C240,56 480,8 720,32 C960,56 1200,8 1440,32 L1440,56 L0,56 Z" fill="rgba(255,255,255,0.13)"/>
        <path d="M0,44 C360,20 720,56 1080,32 C1260,20 1380,40 1440,44 L1440,56 L0,56 Z" fill="rgba(255,255,255,0.09)"/>
      </svg>
    </div>`;
  } else {
    html += `
    <div class="home-hero grad-ocean">
      <div class="home-hero-content">
        <div class="home-greeting">${greeting()}, Traveller</div>
        <div class="home-trip-name">No active trip</div>
        <div class="home-trip-sub">${new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'})}</div>
      </div>
      <svg class="wave-divider" viewBox="0 0 1440 56" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
        <path d="M0,32 C240,56 480,8 720,32 C960,56 1200,8 1440,32 L1440,56 L0,56 Z" fill="rgba(255,255,255,0.13)"/>
        <path d="M0,44 C360,20 720,56 1080,32 C1260,20 1380,40 1440,44 L1440,56 L0,56 Z" fill="rgba(255,255,255,0.09)"/>
      </svg>
    </div>
    <div style="padding:20px 16px">
      <button class="btn btn-primary btn-full" onclick="navigate('edit-trip',{editTripId:null})">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
        Plan a New Trip
      </button>
    </div>`;
  }

  // Today's items
  html += `<div class="today-section">
    <div class="today-label">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      Today

  if (todayItems.length === 0) {
    html += `<div style="padding:16px 0;text-align:center;color:var(--text-muted);font-size:14px">
      ${activeTrip ? 'Nothing scheduled today.' : 'Create a trip to get started.'}
    </div>`;
  } else {
    html += `<div class="timeline-items">`;
    todayItems.forEach(item => {
      html += itemCardHTML(item);
    });
    html += `</div>`;

  // Upcoming
  if (upcomingItems.length > 0) {
    html += `<div class="upcoming-section">

      <div class="timeline-items">`;

  root.innerHTML = html;
  bindItemCards(root);

/* ══════════════════════════════════════════════════════
   TRIPS SCREEN
══════════════════════════════════════════════════════ */
async function renderTrips() {
  const root = document.getElementById('trips-scroll');
  root.innerHTML = '';
  const trips = await Trips.getAll();
  const t     = today();

  if (trips.length === 0) {
    root.innerHTML = `<div class="empty-state">
      <div class="empty-icon">🗺️</div>
      <div class="empty-title">No trips yet</div>
      <div class="empty-sub">Tap + to plan your first adventure</div>
    </div>`;
    return;
  }

  const active   = trips.filter(tr => t >= tr.startDate && t <= tr.endDate);
  const upcoming = trips.filter(tr => tr.startDate > t)
    .sort((a,b) => a.startDate.localeCompare(b.startDate));
  const past     = trips.filter(tr => tr.endDate < t)
    .sort((a,b) => b.startDate.localeCompare(a.startDate));

  let html = '';
  const renderGroup = (label, list) => {
    if (!list.length) return;
    html += `<div class="trips-section">
      <div class="trips-group-label">${label}</div>
      <div class="trips-list">`;
    list.forEach(tr => { html += tripCardHTML(tr); });
    html += `</div></div>`;
  };

  renderGroup('✈️ Active', active);
  renderGroup('🔜 Upcoming', upcoming);
  renderGroup('🕐 Past', past);

  root.innerHTML = html;
}

function tripCardHTML(trip) {
  const grad   = tripGradClass(trip.color);
  const cities = (trip.cities||[]).join(' → ') || trip.country || '';
  const dur    = fmtDuration(trip.startDate, trip.endDate);
  const status = tripStatusLabel(trip);
  return `<div class="trip-card ${grad}" onclick="navigate('trip',{tripId:'${trip.id}'})">
    <div class="trip-card-inner">
      <div class="trip-card-badge">${escHtml(status)}</div>
      <div class="trip-card-name">${escHtml(trip.name)}</div>
      <div class="trip-card-sub">
        <span>${escHtml(cities)}</span>
        <span>·</span>
        <span>${fmtDateShort(trip.startDate)} – ${fmtDateShort(trip.endDate)}</span>
        <span>·</span>
        <span>${escHtml(dur)}</span>
      </div>
    </div>
  </div>`;
}

/* ══════════════════════════════════════════════════════
   TRIP DETAIL SCREEN

async function renderTrip() {
  const root = document.getElementById('trip-detail-root');
  root.innerHTML = '';
  if (!state.tripId) return;

  const [trip, items] = await Promise.all([
    Trips.get(state.tripId),
    Items.forTrip(state.tripId),
  ]);
  if (!trip) return;

  const days  = datesBetween(trip.startDate, trip.endDate);
  if (!state.activeDay || !days.includes(state.activeDay)) {
    state.activeDay = days.includes(today()) ? today() : days[0];
  }
  if (!state.calMonth) {
    state.calMonth = state.activeDay.slice(0,7);
  }

  const grad = tripGradClass(trip.color);
  const cities = (trip.cities||[]).join(' → ') || trip.country || '';

  let html = `
  <div class="app-header">
    <button class="header-back" onclick="goBack()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    </button>
    <span class="header-title">${escHtml(trip.name)}</span>

function setActiveDay(day) {

/* ── CALENDAR ──────────────────────────────────────── */
function renderCalendarHTML(items, trip) {
  const [year, month] = state.calMonth.split('-').map(Number);
  const firstDay = new Date(year, month - 1, 1);
  const lastDay  = new Date(year, month, 0);
  const prevMonth = new Date(year, month - 2, 1).toISOString().slice(0,7);
  const nextMonth = new Date(year, month,     1).toISOString().slice(0,7);
  const startOfGrid = new Date(firstDay);
  startOfGrid.setDate(1 - ((firstDay.getDay() + 6) % 7)); // Mon start

  // Group items by date
  const byDate = {};
  items.forEach(i => {
    if (!byDate[i.date]) byDate[i.date] = [];
    byDate[i.date].push(i);
  });

  const t = today();
  let html = `
  <div style="padding:8px 16px;display:flex;align-items:center;justify-content:space-between">
    <button class="btn btn-ghost btn-sm" onclick="state.calMonth='${prevMonth}';renderTrip()">‹</button>
    <span style="font-weight:700;font-size:15px;font-family:'Plus Jakarta Sans',sans-serif">
      ${firstDay.toLocaleDateString('en-GB',{month:'long',year:'numeric'})}
    </span>
    <button class="btn btn-ghost btn-sm" onclick="state.calMonth='${nextMonth}';renderTrip()">›</button>
  </div>
  <div class="cal-header">
    ${['Mo','Tu','We','Th','Fr','Sa','Su'].map(d=>`<div class="cal-dow">${d}</div>`).join('')}
  </div>
  <div class="cal-grid">`;

  const cur = new Date(startOfGrid);
  for (let i = 0; i < 42; i++) {
    const dateStr   = localDateStr(cur);
    const inTrip    = dateStr >= trip.startDate && dateStr <= trip.endDate;
    const isToday   = dateStr === t;
    const isSelected = dateStr === state.activeDay;
    const isOther   = cur.getMonth() !== month - 1;
    const dayItems  = byDate[dateStr] || [];

    html += `<div class="cal-day ${isToday?'today':''} ${isSelected?'selected':''} ${isOther?'other-month':''}"
      onclick="calDayClick('${dateStr}')" style="${!inTrip&&!isOther?'opacity:0.4':''}">
      <span class="cal-num">${cur.getDate()}</span>
      <div class="cal-dots">`;
    dayItems.slice(0,4).forEach(item => {
      html += `<div class="cal-dot" style="background:${typeColor(item.type)}"></div>`;
    });
    html += `</div></div>`;
    cur.setDate(cur.getDate() + 1);
  }
  html += `</div>`;

  // Show selected day items below
  const selItems = (byDate[state.activeDay] || [])
    .sort((a,b) => (a.time||'').localeCompare(b.time||''));

  html += `<div style="padding:8px 16px 4px">
    <div class="timeline-day-label">${fmtDate(state.activeDay)}</div>
  </div>`;
  if (selItems.length === 0) {
    html += `<div style="padding:12px 16px;color:var(--text-muted);font-size:14px">Nothing on this day.</div>`;
  } else {
    html += `<div class="timeline-items" style="padding:0 16px 16px">`;
    selItems.forEach(item => { html += itemCardHTML(item); });
    html += `</div>`;
  }

  return html;
}

function calDayClick(dateStr) {
  state.activeDay = dateStr;
  state.viewMode  = 'timeline';
  renderTrip();
}

/* ══════════════════════════════════════════════════════
   ITEM CARD HTML + BINDINGS
══════════════════════════════════════════════════════ */
function itemCardHTML(item, showDate = false) {
  const col  = typeColor(item.type);
  const icon = typeIcon(item.type);
  const star = item.isFavourite ? 'active' : '';
  const timeLine = item.time ? `<span class="item-time">${fmtTime(item.time)}</span>` : '';
  const dateLine = showDate && item.date ? `<span>${fmtDateShort(item.date)}</span>` : '';
  const loc  = item.location ? `<span>📍 ${escHtml(item.location)}</span>` : '';

  return `<div class="item-card" data-item-id="${item.id}">
    <div class="item-icon" style="background:${col}22">
      <span>${icon}</span>
    </div>
    <div class="item-body">
      <div class="item-title">${escHtml(item.title)}</div>
      <div class="item-meta">
        ${timeLine}${dateLine}${loc}
        ${item.bookingRef ? `<span style="font-family:'DM Mono',monospace;font-size:12px;color:var(--accent)">${escHtml(item.bookingRef)}</span>` : ''}
      </div>
    </div>
    <button class="item-star ${star}" data-item-star="${item.id}" onclick="event.stopPropagation();toggleFav('${item.id}')">
      ${item.isFavourite ? '⭐' : '☆'}
    </button>
  </div>`;
}

function bindItemCards(root) {
  root.querySelectorAll('[data-item-id]').forEach(el => {
    el.addEventListener('click', () => {
      const id = el.dataset.itemId;
      navigate('item', { itemId: id });
    });
  });
}

async function toggleFav(itemId) {
  const item = await Items.get(itemId);
  if (!item) return;
  item.isFavourite = !item.isFavourite;
  item.updatedAt   = new Date().toISOString();
  await Items.put(item);
  // Update star in DOM
  const btn = document.querySelector(`[data-item-star="${itemId}"]`);
  if (btn) {
    btn.classList.toggle('active', item.isFavourite);
    btn.textContent = item.isFavourite ? '⭐' : '☆';
  }
}

      ${item.time ? `<span style="font-family:'DM Mono',monospace;font-size:14px;color:var(--accent);font-weight:500">🕐 ${fmtTime(item.time)}</span>` : ''}

      <div class="detail-value">📍 ${escHtml(item.location)}</div>

  }

  if (item.bookingRef) {
    html += `<div class="detail-section">
      <div class="detail-label">Booking Reference</div>
      <div class="detail-mono">${escHtml(item.bookingRef)}</div>
    </div>`;
  }

  if (item.contactInfo) {
    html += `<div class="detail-section">
      <div class="detail-label">Contact</div>
      <div class="detail-value">${escHtml(item.contactInfo)}</div>

      <div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:4px">`;

  // Attachments
  if (item.attachments && item.attachments.length > 0) {
    html += `<div class="detail-section">
      <div class="detail-label">Attachments</div>
      <div class="attach-grid" style="margin-top:8px">`;
    item.attachments.forEach((att, idx) => {
      if (att.type === 'image') {
        html += `<div class="attach-thumb" onclick="openImgOverlay('${escHtml(att.data)}')">
          <img src="${att.data}" alt="${escHtml(att.name)}" loading="lazy">
        </div>`;
      } else {
        html += `<div class="attach-thumb attach-pdf" onclick="openPdf('${idx}','${item.id}')">
          <span class="attach-pdf-icon">📄</span>
          <span class="attach-pdf-name">${escHtml(att.name)}</span>
        </div>`;
      }
    });

  }

  // Map
  if (item.lat && item.lng) {
    html += `<div class="detail-section">
      <div class="detail-label">Map</div>
      <div id="leaflet-map" style="margin-top:8px"></div>

          attribution:'© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
          maxZoom:19,
        }).addTo(map);
        L.marker([item.lat, item.lng]).addTo(map)
          .bindPopup(item.location || item.title).openPopup();
        state.leafletMap = map;
      } catch(e) { console.error('Map error:', e); }
    }, 150);
  }
}

async function openPdf(idx, itemId) {
  const item = await Items.get(itemId);
  if (!item || !item.attachments[idx]) return;
  const att  = item.attachments[idx];
  const blob = dataURLtoBlob(att.data);
  const url  = URL.createObjectURL(blob);
  window.open(url, '_blank');
}

function openImgOverlay(src) {
  document.getElementById('img-overlay-img').src = src;
  document.getElementById('img-overlay').classList.add('show');
}
function closeImgOverlay() {
  document.getElementById('img-overlay').classList.remove('show');
  document.getElementById('img-overlay-img').src = '';
}

function dataURLtoBlob(dataURL) {
  const [meta, b64] = dataURL.split(',');
  const mime = meta.match(/:(.*?);/)[1];
  const bin  = atob(b64);
  const arr  = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return new Blob([arr], { type: mime });
}

/* ══════════════════════════════════════════════════════
   EDIT TRIP SCREEN
══════════════════════════════════════════════════════ */
async function renderEditTrip() {
  const root = document.getElementById('edit-trip-form');
  const isNew = !state.editTripId;
  document.getElementById('edit-trip-header-title').textContent = isNew ? 'New Trip' : 'Edit Trip';

  let trip = {
    id: uid(), name:'', country:'', cities:[], startDate:'', endDate:'',
    color:'grad-ocean', createdAt: new Date().toISOString(), updatedAt: new Date().toISOString()
  };
  if (!isNew) {
    const existing = await Trips.get(state.editTripId);
    if (existing) trip = { ...existing };
  }

  const colors = ['grad-ocean','grad-sunset','grad-forest','grad-rose','grad-gold','grad-slate'];
  const colorSwatches = colors.map(c => {
    const gradMap = {
      'grad-ocean':'linear-gradient(135deg,#1665C0,#0698A0)',
      'grad-sunset':'linear-gradient(135deg,#E65100,#F57F17)',
      'grad-forest':'linear-gradient(135deg,#1B5E20,#00695C)',
      'grad-rose':'linear-gradient(135deg,#AD1457,#C2185B)',
      'grad-gold':'linear-gradient(135deg,#F57F17,#FFB300)',
      'grad-slate':'linear-gradient(135deg,#263238,#546E7A)',
    };
    return `<div class="color-swatch ${trip.color===c?'selected':''}"
      style="background:${gradMap[c]}" data-color="${c}"
      onclick="document.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('selected'));
               this.classList.add('selected');
               document.getElementById('trip-color').value='${c}'">
    </div>`;
  }).join('');

  const tagsHtml = (trip.cities||[]).map(c =>
    `<span class="tag-chip">${escHtml(c)}<button onclick="removeCity('${escHtml(c)}')" type="button">×</button></span>`
  ).join('');

  root.innerHTML = `
  <div class="form-section">
    <div class="form-group">
      <label class="form-label">Trip Name</label>
      <input class="form-input" id="trip-name" placeholder="e.g. Malaysia Adventure" value="${escHtml(trip.name)}">
    </div>
    <div class="form-group">
      <label class="form-label">Country</label>
      <input class="form-input" id="trip-country" placeholder="e.g. Malaysia" value="${escHtml(trip.country||'')}">
    </div>
    <div class="form-group">
      <label class="form-label">Cities</label>
      <div class="tag-input-wrap" id="city-tags-wrap" onclick="document.getElementById('city-input').focus()">
        <span id="city-tags">${tagsHtml}</span>
        <input class="tag-input-field" id="city-input" placeholder="Add city, press Enter">
      </div>
      <span style="font-size:12px;color:var(--text-muted)">Press Enter or comma to add each city</span>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Start Date</label>
        <input class="form-input" type="date" id="trip-start" value="${trip.startDate}">
      </div>
      <div class="form-group">
        <label class="form-label">End Date</label>
        <input class="form-input" type="date" id="trip-end" value="${trip.endDate}">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Colour</label>
      <div class="color-picker">${colorSwatches}</div>
      <input type="hidden" id="trip-color" value="${trip.color}">
    </div>
  </div>
  <input type="hidden" id="trip-edit-id" value="${trip.id}">`;

  // Tag input handler
  const cityInput = root.querySelector('#city-input');
  const cityTags  = root.querySelector('#city-tags');
  let   _cities   = [...(trip.cities||[])];

  cityInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ',') {
      e.preventDefault();
      const val = cityInput.value.trim().replace(/,$/,'');
      if (val && !_cities.includes(val)) {
        _cities.push(val);
        renderCityTags();
      }
      cityInput.value = '';
    } else if (e.key === 'Backspace' && !cityInput.value && _cities.length) {
      _cities.pop();
      renderCityTags();
    }
  });

  function renderCityTags() {
    cityTags.innerHTML = _cities.map(c =>
      `<span class="tag-chip">${escHtml(c)}<button type="button" data-remove="${escHtml(c)}">×</button></span>`
    ).join('');
    cityTags.querySelectorAll('[data-remove]').forEach(btn => {
      btn.addEventListener('click', () => {
        _cities = _cities.filter(x => x !== btn.dataset.remove);
        renderCityTags();
      });
    });
  }

  // Save handler
  document.getElementById('save-trip-btn').onclick = async () => {
    const name    = document.getElementById('trip-name').value.trim();
    const country = document.getElementById('trip-country').value.trim();
    const start   = document.getElementById('trip-start').value;
    const end     = document.getElementById('trip-end').value;
    const color   = document.getElementById('trip-color').value;

    if (!name)  { showToast('Please enter a trip name'); return; }
    if (!start) { showToast('Please set a start date');  return; }
    if (!end)   { showToast('Please set an end date');   return; }
    if (start > end) { showToast('End date must be after start date'); return; }

    const saved = {
      ...trip, name, country, cities: _cities, startDate: start, endDate: end, color,
      updatedAt: new Date().toISOString(),
    };
    if (isNew) saved.createdAt = new Date().toISOString();
    await Trips.put(saved);
    showToast(isNew ? '🗺️ Trip created!' : '✅ Trip updated!');
    navigate('trip', { tripId: saved.id });
  };
}

async function renderEditItem() {
  const root  = document.getElementById('edit-item-form');

  let item = {

    title:'', date: state.editItemDate || today(), time:'',
    location:'', lat:null, lng:null, bookingRef:'',
    contactInfo:'', description:'', urls:[], attachments:[],
    isFavourite:false,
    createdAt: new Date().toISOString(), updatedAt: new Date().toISOString()
  };
  if (!isNew) {
    const existing = await Items.get(state.editItemId);
    if (existing) item = { ...existing, attachments: existing.attachments || [], urls: existing.urls || [] };

  let _urls        = [...(item.urls||[])];
  let _attachments = [...(item.attachments||[])];

  const types = ['flight','hotel','activity','transport','meal','other'];
  const typeButtons = types.map(t => {

    <div class="form-row">

        <input class="form-input" type="date" id="item-date" value="${item.date}">
      </div>

        <label class="form-label">Time</label>
        <input class="form-input" type="time" id="item-time" value="${item.time||''}">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Location</label>
      <input class="form-input" id="item-location" placeholder="e.g. KLIA Terminal 1" value="${escHtml(item.location||'')}">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Latitude</label>
        <input class="form-input" type="number" step="any" id="item-lat" placeholder="3.1390" value="${item.lat||''}">
      </div>
      <div class="form-group">
        <label class="form-label">Longitude</label>
        <input class="form-input" type="number" step="any" id="item-lng" placeholder="101.6869" value="${item.lng||''}">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Booking Reference</label>
      <input class="form-input" id="item-booking" placeholder="e.g. ABC123" value="${escHtml(item.bookingRef||'')}" style="font-family:'DM Mono',monospace">
    </div>
    <div class="form-group">
      <label class="form-label">Contact Info</label>
      <input class="form-input" id="item-contact" placeholder="e.g. +60 12-345 6789" value="${escHtml(item.contactInfo||'')}">
    </div>
    <div class="form-group">
      <label class="form-label">Notes</label>
      <textarea class="form-input" id="item-notes" placeholder="Any additional notes...">${escHtml(item.description||'')}</textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Links</label>
      <div id="url-list"></div>
      <button type="button" class="btn btn-ghost btn-sm" style="margin-top:8px" onclick="addUrlRow()">+ Add Link</button>
    </div>
    <div class="form-group">
      <label class="form-label">Attachments</label>
      <div id="attach-list" class="attach-grid" style="margin-bottom:8px"></div>

  // Render URL list

    const ul = root.querySelector('#url-list');

      </div>`).join('');

  window._editUrlList = _urls;
  window._addUrlRow   = () => { _urls.push(''); renderUrlList(); };
  window._removeUrl   = (i) => { _urls.splice(i, 1); renderUrlList(); };

  // Render attachments
  function renderAttachList() {
    const al = root.querySelector('#attach-list');
    al.innerHTML = _attachments.map((att, i) => {

        return `<div class="attach-thumb">

      date,

      description: document.getElementById('item-notes').value.trim(),
      urls:        finalUrls,
      attachments: _attachments,
      updatedAt:   new Date().toISOString(),

    await Items.put(saved);
    showToast(isNew ? '📍 Item added!' : '✅ Item updated!');
    navigate('trip', { tripId: saved.tripId, activeDay: saved.date });
  };
}

/* Global helpers called from inline onclick */
function addUrlRow()      { window._addUrlRow && window._addUrlRow(); }
function removeUrl(i)     { window._removeUrl && window._removeUrl(i); }
function removeAttach(i)  { window._removeAttach && window._removeAttach(i); }

function selectType(t) {
  document.getElementById('item-type').value = t;
  const col = typeColor(t);
  document.querySelectorAll('.type-btn').forEach(btn => {
    const isThis = btn.dataset.type === t;
    btn.classList.toggle('selected', isThis);
    btn.style.background    = isThis ? col : '';
    btn.style.borderColor   = isThis ? col : '';
    btn.style.color         = isThis ? '#fff' : '';
  });
}

async function handleFileUpload(input) {
  const files = Array.from(input.files);
  for (const file of files) {
    const data = await fileToBase64(file);
    const type = file.type.startsWith('image/') ? 'image' : 'pdf';
    window._attachments.push({ name: file.name, type, data });
  }
  window._renderAttach && window._renderAttach();
  input.value = '';
  showToast(`${files.length} file(s) attached`);
}

function fileToBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload  = e => res(e.target.result);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

    showToast('Notifications disabled');
    renderSettings();

    if (perm === 'granted') {

      scheduleNotifications();
      showToast('🔔 Notifications enabled');

    renderSettings();

async function renderShare() {
  const root = document.getElementById('share-root');
  if (!state.shareTripId) return;

  const trip  = await Trips.get(state.shareTripId);
  const items = await Items.forTrip(state.shareTripId);
